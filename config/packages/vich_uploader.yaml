vich_uploader:
    db_driver: orm

    mappings:
        protocole_pdf:
            uri_prefix: /uploads/protocoles/pdf
            upload_destination: '%kernel.project_dir%/public/uploads/protocoles/pdf'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        protocole_image:
            uri_prefix: /uploads/protocoles/images
            upload_destination: '%kernel.project_dir%/public/uploads/protocoles/images'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
